baseURL: "https://kademedley.com/"
languageCode: "en-us"
title: "Kade Medley — Technical Support & Field Service"
theme: "PaperMod"

# Build settings
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
minify: true

# Pagination
pagination:
  pagerSize: 10

# Menu — Vietnam (primary)
menu:
  main:
    - identifier: home
      name: Home
      url: /vietnam/
      weight: 10
    - identifier: hire-me
      name: Hire Me
      url: /vietnam/hire-me/
      weight: 20
    - identifier: projects
      name: Projects
      url: /vietnam/projects/
      weight: 30
    - identifier: about
      name: About
      url: /vietnam/about/
      weight: 40
    - identifier: contact
      name: Contact
      url: /vietnam/contact/
      weight: 50



params:
  # Site metadata
  env: production
  author: Kade Medley
  description: "English-first Technical Support & Field Service professional for Vietnam. Customer-facing troubleshooting, installation, commissioning support, and technical liaison."
  keywords:
    - technical support
    - field service
    - troubleshooting
    - diagnostics
    - installation
    - commissioning
    - calibration
    - Vietnam
    - English speaker
    - technical liaison

  # Theme settings
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  hidemeta: true
  hideSummary: false

  # Home page info mode
  homeInfoParams:
    Title: "English-first Technical Support / Field Service — Vietnam"
    Content: |
      Customer-facing troubleshooting, installation & commissioning support, technical documentation, and practical systems support for Vietnam-based employers.

      **Australian national** — employer-sponsored Vietnam work authorization pathway ready. Documentation prepared.

  # Social icons (shown on home)
  socialIcons:
    - name: email
      url: "mailto:kade@kademedley.com"
    - name: linkedin
      url: "https://www.linkedin.com/in/kademedley/"

  # Cover image defaults
  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  # SEO / OpenGraph
  assets:
    favicon: "/favicon.svg"
    disableFingerprinting: false

  # OpenGraph / Twitter cards
  images:
    - /images/og-image.png

  # Label (site branding)
  label:
    text: "Kade Medley"
    iconHeight: 35

# Outputs
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Markup settings
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false